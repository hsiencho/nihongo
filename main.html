<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日語全方位特訓系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">

        <div id="settings-panel" class="modal" style="display: none;">
            <div class="modal-content">
                <h3>⚙️ 測驗目標設定</h3>
                <br>
                <label>🎯 每種模式過關次數：</label>
                <input type="number" id="target-count-input" min="1" max="10" value="2" style="width: 50px; font-size: 1.1rem; text-align: center;">
                <br><br>
                
                <div style="text-align: left; background: var(--bg-color); padding: 15px; border-radius: 10px; display: inline-block;">
                    <p style="margin-bottom: 10px; font-weight: bold; color: var(--primary);">📝 啟用測驗模式：</p>
                    <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer;">
                        <input type="checkbox" id="setting-mode-voice" checked style="transform: scale(1.2);"> 🎤 語音特訓
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer;">
                        <input type="checkbox" id="setting-mode-audioMatch" checked style="transform: scale(1.2);"> 🎧 盲聽配對
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer;">
                        <input type="checkbox" id="setting-mode-listen" checked style="transform: scale(1.2);"> 👂 純聽力測驗
                    </label>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" id="setting-mode-zhToJp" style="transform: scale(1.2);"> 📃 中翻日測驗
                    </label>
                </div>
                <br><br>
                <button id="save-settings-btn" class="action-btn">💾 儲存並關閉</button>
            </div>
        </div>

        <div id="daily-panel" class="modal" style="display: none;">
            <div class="modal-content" style="max-width: 500px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 id="daily-title" style="margin: 0; flex: 1; text-align: left;">🏆 每日挑戰 <span id="daily-date-text" style="font-size: 0.9rem; color: var(--text-muted);"></span></h3>
                    <button id="daily-refresh-btn" class="ghost-btn" style="font-size: 0.9rem;">🔄 刷新挑戰</button>
                </div>
                
                <div style="background: var(--bg-color); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                    <p style="font-size: 1.1rem; margin-bottom: 5px;">目前時間：<strong id="daily-current-time">--:--:--</strong></p>
                    <p style="color: var(--text-muted); font-size: 0.95rem;">距今日結束剩餘：<span id="daily-time-left">--:--:--</span></p>
                </div>
                
                <p id="daily-congratulations" style="display: none; color: var(--success); font-weight: bold; font-size: 1.2rem; margin-bottom: 15px;">🎉 恭喜！您已完成本日挑戰！</p>
                
                <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                    <button id="daily-preview-btn" class="action-btn" style="background: #74b9ff; color: #2d3436; flex: 1; min-width: 140px;">📇 預習挑戰單字</button>
                    <button id="daily-start-btn" class="action-btn" style="background: #55efc4; color: #2d3436; flex: 1; min-width: 140px;">⚔️ 開始挑戰</button>
                </div>
                
                <button class="ghost-btn full-width" style="margin-top: 15px;" onclick="closeDailyModal()">關閉</button>
            </div>
        </div>

        <div id="home-menu" class="menu-container">
            <h1>📓 日語特訓</h1>
            <select id="theme-select"></select>
            <select id="home-tag-select" style="display: none;"></select>
            
            <div class="checkbox-group" id="level-checkboxes">
                <label><input type="checkbox" value="N5" checked> N5 基礎</label>
                <label><input type="checkbox" value="N4"> N4 初級</label>
                <label><input type="checkbox" value="N3"> N3 中級</label>
                <label><input type="checkbox" value="N2"> N2 中高</label>
                <label><input type="checkbox" value="N1"> N1 高級</label>
            </div>

            <div class="main-menu-actions">
                <button id="view-cards-btn" class="action-btn" style="background: #74b9ff; color: #2d3436;">📇 預習單字卡</button>
                
                <div class="action-btn-wrapper">
                    <button id="start-btn" class="action-btn" style="background: #55efc4; color: #2d3436; padding-right: 50px;">⚔️ 開始測驗特訓</button>
                    <button id="btn-settings" class="overlay-icon-btn" title="測驗設定">⚙️</button>
                </div>
                
                <div class="action-btn-wrapper">
                    <button id="daily-btn" class="action-btn" style="background: #fdcb6e; color: #2d3436; padding-right: 50px;">🏆 每日挑戰</button>
                    <div class="overlay-icon-text">
                        <span id="daily-status">❌</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="flashcard-container" style="display: none; width: 100%; flex-direction: column; flex: 1;">
            <div class="hud" style="position: relative;">
                <button class="back-btn go-home-btn icon-btn" style="position: relative; z-index: 2; font-weight: bold; color: var(--text-muted); font-size: 1.1rem;">🏠 返回</button>
                
                <div style="position: absolute; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; z-index: 1;">
                    <select id="flashcard-tag-select" style="display:none; padding: 5px; border-radius: 8px; border: 1px solid var(--border-color); max-width: 150px; pointer-events: auto; background: var(--card-bg);"></select>
                </div>
                
                <span style="position: relative; z-index: 2; font-weight: bold; color: var(--text-muted); font-size: 1.1rem;">單字卡</span>
            </div>

            <div class="flashcard-wrapper">
                <div class="flashcard" id="flashcard">
                    <div class="card-content" onclick="flipCard()">
                        <div class="card-front" id="card-front">
                            <h2 id="card-jp-front" class="front-jp"></h2>
                        </div>

                        <div class="card-back" id="card-back">
                            
                            <div class="back-vocab-section clickable-area" onclick="playAudioCard('word', event)">
                                <div class="word-header-container">
                                    <div class="grid-left"></div>
                                    <div id="card-jp-back" class="back-jp-main"></div>
                                    <div class="badge-wrapper">
                                        <div id="card-pos-back" class="pos-badge" style="display: none;"></div>
                                        <div id="card-pitch" class="pitch-badge" style="display: none;"></div>
                                    </div>
                                </div>
                                <div id="card-kana" class="kana-text"></div>
                                <div id="card-romaji" class="romaji-text"></div>
                                <div id="card-zh" class="zh-text"></div>
                            </div>
                            
                            <div id="card-note" class="note-text" style="display: none; margin: 0 0.5rem;"></div>

                            <hr>

                            <div id="card-example-box" class="example-section clickable-area" onclick="playAudioCard('example', event)">
                                <div id="card-ex-jp" class="ex-jp-text"></div>
                                <div id="card-ex-kana" class="ex-kana-text"></div>
                                <div id="card-ex-romaji" class="ex-romaji-text"></div>
                                <div id="card-ex-zh" class="ex-zh-text"></div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <div class="nav-buttons">
                <button id="prev-card" class="nav-btn">⬅️</button>
                <div class="nav-center-controls">
                    <button id="flip-back-btn" class="flip-back-btn" onclick="resetCardToFront()">🔄 翻回正面</button>
                    <span id="card-progress" class="index-text">1 / 1</span>
                </div>
                <button id="next-card" class="nav-btn">➡️</button>
            </div>
        </div>

        <div id="game-container" style="display: none; width: 100%; flex-direction: column; flex: 1;">
            <div class="hud">
                <button class="back-btn go-home-btn icon-btn">🏠 放棄</button>
                <span>剩餘目標: <span id="progress">0</span></span>
                <button id="skip-btn" class="ghost-btn">⏭️ 跳過</button>
            </div>

            <div class="battle-area" id="question-area">
                <div class="question-card">
                    <div id="question-mode-label" style="color: var(--text-light); margin-bottom: 10px; font-weight: bold;"></div>
                    <h2 id="enemy-word" style="font-size: 3rem; margin: 10px 0;"></h2>
                    
                    <div id="voice-input-container" style="display: none; flex-direction: column; align-items: center; width: 100%;">
                        <button id="mic-btn" class="mic-btn">🎤 按住說話</button>
                        <p id="mic-status" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 10px;"></p>
                        
                        <div id="romaji-input-area" style="display: none; margin-top: 15px; width: 100%;">
                            <input type="text" id="romaji-input" placeholder="輸入羅馬拼音 (如 watashi)..." style="padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 1px solid var(--border-color); width: 100%; max-width: 250px; text-align: center;">
                            <button id="romaji-submit" class="action-btn" style="padding: 10px 20px; margin-top: 10px; background: #74b9ff; color: #2d3436;">送出</button>
                        </div>
                        
                        <button id="toggle-romaji-btn" class="ghost-btn" style="margin-top: 15px;">⌨️ 切換鍵盤輸入</button>
                    </div>

                    <button id="replay-audio" class="play-audio-btn" style="display: none; margin: 10px auto; width: 80px; height: 80px; border-radius: 50%;">🔊</button>
                </div>
                <div class="controls" id="options-area"></div>
            </div>

            <div class="battle-area" id="explanation-area" style="display: none;">
                <div class="question-card text-left">
                    <h2 id="result-title" class="text-center" style="margin-bottom: 15px;"></h2>
                    
                    <div id="wrong-feedback-box" class="feedback-box" style="display: none;">
                        <p class="danger-text">❌ 你的答案：</p>
                        <p id="user-wrong-ans" style="margin-top: 5px;"></p>
                    </div>
                    
                    <div class="explain-content">
                        <p class="success-text">✅ 正確解答：</p>
                        
                        <div class="back-vocab-section clickable-area" onclick="playAudioCard('test-word', event)" style="background: var(--bg-color); border-radius: 1rem;">
                            <div class="word-header-container">
                                <div class="grid-left"></div>
                                <h2 id="ex-jp" class="back-jp-main" style="font-size: 2.8rem; margin-bottom: 0;"></h2>
                                <div class="badge-wrapper">
                                    <div id="ex-pos" class="pos-badge" style="display: none;"></div>
                                    <div id="ex-pitch" class="pitch-badge" style="display: none;"></div>
                                </div>
                            </div>
                            <div id="ex-kana" class="kana-text" style="font-size: 1.5rem;"></div>
                            <div id="ex-zh" class="zh-text" style="font-size: 1.3rem;"></div>
                        </div>  

                        <p id="ex-note" class="note-text" style="display: none; margin-top: 15px;"></p>
                        
                        <div id="test-example-box" class="example-section clickable-area" style="display: none; margin-top: 15px; background: var(--bg-color); border-radius: 1rem;" onclick="playAudioCard('test-example', event)">
                            <div id="test-ex-jp" class="ex-jp-text"></div>
                            <div id="test-ex-kana" class="ex-kana-text"></div>
                            <div id="test-ex-romaji" class="ex-romaji-text"></div>
                            <div id="test-ex-zh" class="ex-zh-text"></div>
                        </div>
                    </div>
                </div>
                <button id="next-btn" class="action-btn full-width" style="background: #74b9ff; color: #2d3436;">下一題 ➡️</button>
            </div>
        </div>

        <div class="bottom-controls">
            <span style="font-size: 0.9rem; font-weight: bold; color: var(--text-muted);">A</span>
            <input type="range" id="font-scale-slider" min="0.7" max="1.4" step="0.05" value="1">
            <span style="font-size: 1.4rem; font-weight: bold; color: var(--text-muted);">A</span>
        </div>

    </div>

    <script src="data/manifest.js"></script>
    <script>
        if (window.courseList) {
            window.courseList.forEach(fileName => {
                const script = document.createElement('script');
                script.src = `data/${fileName}`;
                script.async = false;
                document.head.appendChild(script);
            });
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
